<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .nav-btn { text-decoration: none; display: flex; align-items: center; }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar glass-panel">
            <div class="logo">
                <span class="icon"><i class="fi fi-rr-gamepad"></i></span>
                <h2>Mi Colección</h2>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-btn active">
                    <span class="icon"><i class="fi fi-rr-book-alt"></i></span> Mis Juegos
                </a>
                <a href="agregar.html" class="nav-btn">
                    <span class="icon"><i class="fi fi-rr-add"></i></span> Añadir Juego
                </a>
                <a href="tiendas.html" class="nav-btn">
                    <span class="icon"><i class="fi fi-rr-marker"></i></span> Ubicar tienda
                </a>
                <a href="recomendaciones.html" class="nav-btn">
                    <span class="icon"><i class="fi fi-rr-star"></i></span> Recomendaciones
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <section id="view-db" class="view-section active">
                <header class="section-header">
                    <h1>Mis Juegos Locales</h1>
                </header>
                <div class="actions" style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="search-input" placeholder="Buscar por título o género..." style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); flex: 1; max-width: 300px;">
                </div>
                <div id="db-error-msg" class="error-msg hidden"></div>
                <div id="db-results" class="games-grid">
                    <!-- Cards injected via JS -->
                </div>
            </section>
            
            <footer class="site-footer">
                <p>&copy; 2026 DTC GANG V3. Todos los derechos reservados.</p>
            </footer>
        </main>

        <div id="edit-modal" class="modal-overlay hidden">
            <div class="card-container form-card glass-panel" style="background: var(--bg-color);">
                <header class="section-header" style="margin-bottom: 1rem;">
                    <h2>Editar Juego</h2>
                </header>
                <form id="edit-form">
                    <input type="hidden" id="edit-id" name="id">
                    <div class="form-group">
                        <label for="edit-title">Título del Juego</label>
                        <input type="text" id="edit-title" name="title">
                    </div>
                    <div class="form-group">
                        <label for="edit-genre">Género</label>
                        <select id="edit-genre" name="genre" required>
                            <option value="Acción">Acción</option>
                            <option value="Aventura">Aventura</option>
                            <option value="RPG">RPG</option>
                            <option value="Deportes">Deportes</option>
                            <option value="Estrategia">Estrategia</option>
                            <option value="Shooter">Shooter</option>
                            <option value="Plataformas">Plataformas</option>
                            <option value="Puzzle">Puzzle</option>
                            <option value="Conducción">Conducción</option>
                            <option value="Terror">Terror</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Plataformas</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="PlayStation 4"> PlayStation 4</label>
                            <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="PlayStation 5"> PlayStation 5</label>
                            <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="Xbox One"> Xbox One</label>
                            <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="Xbox Series X/S"> Xbox Series X/S</label>
                            <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="PC"> PC</label>
                            <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="Nintendo Switch 2"> Nintendo Switch 2</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="edit-release_year">Año de Lanzamiento</label>
                        <input type="number" id="edit-release_year" name="release_year">
                    </div>
                    <div id="edit-error" class="error-msg hidden"></div>
                    <div style="display: flex; gap: 10px; margin-top: 1rem;">
                        <button type="submit" class="btn-primary" id="btn-submit-edit">Guardar Cambios</button>
                        <button type="button" class="btn-secondary" id="btn-close-edit">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="js/index.js"></script>
</body>

</html>
